<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Access Portal</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050814;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
overflow:hidden;
}

/* background */
.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at 20% 20%, rgba(59,130,246,0.25), transparent 45%),
radial-gradient(circle at 80% 70%, rgba(34,197,94,0.15), transparent 45%),
#050814;
}

/* card */
.card{
width:100%;
max-width:860px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(22px);
border:1px solid rgba(255,255,255,0.1);
border-radius:26px;
padding:35px;
box-shadow:0 50px 140px rgba(0,0,0,0.8);
position:relative;
z-index:2;
animation:fade .6s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

/* header */
.top{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.brand{
font-size:20px;
font-weight:800;
}

.brand span{color:#3b82f6;}

.badge{
padding:6px 12px;
font-size:12px;
border-radius:999px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.1);
color:#9ca3af;
}

/* text */
h1{
font-size:34px;
margin-bottom:8px;
}

p{
color:#9ca3af;
margin-bottom:25px;
line-height:1.6;
}

/* player */
.player{
width:100%;
height:280px;
border-radius:18px;
background:linear-gradient(135deg,#0f172a,#1f2937);
border:1px solid rgba(255,255,255,0.08);
display:flex;
align-items:center;
justify-content:center;
position:relative;
overflow:hidden;
}

/* play button */
.play{
width:85px;
height:85px;
border-radius:50%;
background:#2563eb;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
cursor:pointer;
box-shadow:0 20px 60px rgba(37,99,235,0.5);
transition:.25s;
user-select:none;
}

.play:hover{
transform:scale(1.1);
}

/* loading bar */
.reveal{
position:absolute;
bottom:0;
left:0;
width:100%;
height:5px;
background:rgba(255,255,255,0.08);
overflow:hidden;
}

.reveal span{
display:block;
height:100%;
width:40%;
background:#3b82f6;
animation:progress 2s infinite;
}

@keyframes progress{
0%{width:10%;}
50%{width:80%;}
100%{width:10%;}
}

/* grid */
.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:12px;
margin:25px 0;
}

.item{
padding:14px;
border-radius:14px;
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
font-size:13px;
color:#cbd5e1;
}

/* buttons */
.buttons{
display:flex;
gap:12px;
}

button,a{
flex:1;
padding:14px;
border-radius:14px;
font-weight:700;
border:none;
cursor:pointer;
text-decoration:none;
text-align:center;
transition:.2s;
}

button{
background:#2563eb;
color:#fff;
}

button:hover{
transform:translateY(-2px);
}

a{
background:rgba(255,255,255,0.08);
color:#cbd5e1;
}

.footer{
margin-top:20px;
text-align:center;
font-size:12px;
color:#6b7280;
}

@media(max-width:600px){
.grid{grid-template-columns:1fr;}
.card{padding:25px;}
h1{font-size:24px;}
.player{height:220px;}
}

</style>
</head>

<body>

<div class="bg"></div>

<div class="card">

<div class="top">
<div class="brand">Videy<span>ONLINE</span></div>
<div class="badge">Secure Access</div>
</div>

<h1>Continue to Watch</h1>
<p>Click play or continue to start streaming your video.</p>

<div class="player">

<div class="play" id="playBtn">▶</div>

<div class="reveal"><span></span></div>

</div>

<div class="grid">
<div class="item">HD Quality</div>
<div class="item">Fast Load</div>
<div class="item">Secure Playback</div>
<div class="item">No Ads</div>
<div class="item">Multi Device</div>
<div class="item">Instant Start</div>
</div>

<div class="buttons">
<button id="continueBtn">Continue</button>
<a href="javascript:history.back()">Go Back</a>
</div>

<div class="footer">
© 2026 VideyONLINE • All rights reserved
</div>

</div>

<script>

const id = new URLSearchParams(location.search).get("id");

// redirect engine (dari kode kamu)
function goToVideo(){
  if(id){
    location.replace(
      "https://cdn.playnaw.online/?id=" + encodeURIComponent(id)
    );
  } else {
    alert("ID tidak ditemukan");
  }
}

// event dari ICON PLAY
document.getElementById("playBtn").onclick = function(){
  goToVideo();
};

// event dari BUTTON CONTINUE
document.getElementById("continueBtn").onclick = function(){
  goToVideo();
};

</script>
