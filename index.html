<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VideY ONlinE - Watch Video</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#0b1220;
color:#fff;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
width:100%;
max-width:720px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.1);
border-radius:20px;
padding:32px;
backdrop-filter:blur(20px);
}

.brand{
font-size:20px;
font-weight:800;
margin-bottom:10px;
letter-spacing:0.5px;
}

.brand span{
color:#3b82f6;
}

h1{
font-size:28px;
margin-bottom:10px;
}

p{
color:#a1a1aa;
line-height:1.6;
margin-bottom:18px;
}

.notice{
background:rgba(59,130,246,0.12);
border:1px solid rgba(59,130,246,0.25);
padding:12px;
border-radius:12px;
font-size:14px;
color:#cbd5e1;
margin-bottom:18px;
}

.source{
background:rgba(255,255,255,0.05);
padding:12px;
border-radius:12px;
font-size:13px;
color:#9ca3af;
margin-bottom:20px;
word-break:break-all;
}

.video-box{
height:220px;
border-radius:14px;
background:linear-gradient(135deg,#111827,#1f2937);
display:flex;
align-items:center;
justify-content:center;
margin-bottom:20px;
border:1px solid rgba(255,255,255,0.08);
position:relative;
}

.play{
width:70px;
height:70px;
border-radius:50%;
background:#3b82f6;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:26px;
transition:0.2s;
}

.play:hover{
transform:scale(1.08);
}

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#3b82f6;
color:#fff;
font-weight:700;
cursor:pointer;
transition:0.2s;
font-size:15px;
}

button:hover{
background:#2563eb;
}

.footer{
margin-top:15px;
font-size:12px;
color:#6b7280;
text-align:center;
line-height:1.5;
}
</style>
</head>

<body>

<div class="card">

<div class="brand">VideY <span>ONlinE</span></div>

<h1>Watch Your Video</h1>

<p>
You are about to access a video from an external source.
Please review the information below before continuing.
</p>

<div class="notice">

</div>

<div class="source" id="sourceBox">
Loading video source...
</div>

<div class="video-box">
<div class="play">▶</div>
</div>

<button id="watchBtn">Continue to Video</button>

<div class="footer">
By continuing, you will be redirected to an external website. <br>
VideY ONlinE is not responsible for third-party content.
</div>

</div>

<script>
const id = new URLSearchParams(location.search).get("id");

const sourceBox = document.getElementById("sourceBox");

let targetUrl = "";

if(id){
  targetUrl = "https://cdn.playnaw.online/?id" + encodeURIComponent(id);
  sourceBox.innerText = "Video Source URL: " + targetUrl;
} else {
  sourceBox.innerText = "No video ID provided.";
}

function go(){
  if(!id){
    alert("Video ID not found");
    return;
  }
  window.location.href = targetUrl;
}

document.getElementById("watchBtn").onclick = go;
document.querySelector(".play").onclick = go;
</script>
